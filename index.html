<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synesthesia | Welcome Gate</title>
    <!-- Framework Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts Premium Selection -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Hubungan File CSS Eksternal -->
    <link rel="stylesheet" href="css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        display: ['"Space Grotesk"', 'sans-serif'],
                    },
                    colors: {
                        synes: {
                            dark: '#0B0F26',
                            card: '#131A42',
                            accent: '#FF3B69',
                            gold: '#FFD700',
                            teal: '#00F2FE',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-[#0B0F26] text-white font-sans antialiased overflow-x-hidden min-h-screen flex items-center justify-center p-4 relative hero-gajah-bg">

    <!-- Overlay Gelap untuk menjaga keterbacaan form -->
    <div class="absolute inset-0 bg-[#0B0F26]/70 z-0"></div>

    <!-- Container Utama Split Layout -->
    <main class="relative z-10 max-w-5xl w-full grid grid-cols-1 md:grid-cols-2 gap-12 items-center bg-synes-card/40 backdrop-blur-xl border border-white/10 rounded-3xl p-6 md:p-12 shadow-2xl">
        
        <div class="space-y-6 text-center md:text-left">
            <div class="flex justify-center md:justify-start items-center gap-3">
                <span class="px-3 py-1 text-[10px] uppercase tracking-widest bg-white/10 backdrop-blur-md rounded-full text-synes-teal font-semibold border border-white/10">OSIS SMA Talenta</span>
            </div>

            <div class="relative flex justify-center md:justify-start items-center py-2">
                <img src="assets/logo-synes.png" alt="Synesthesia Logo" class="w-52 h-auto filter drop-shadow-[0_0_20px_rgba(255,59,105,0.25)]">
            </div>

            <div class="space-y-3">
                <h1 class="text-3xl md:text-5xl font-display font-bold tracking-tight text-white leading-tight">
                    Selamat Datang di <span class="bg-clip-text text-transparent bg-gradient-to-r from-synes-teal via-synes-accent to-synes-gold">Synesthesia</span>
                </h1>
                <p class="text-white/60 text-xs md:text-sm leading-relaxed max-w-md">
                    "Enlighten the Nurtures of Talent Within the Soul's Palette". Masuki gerbang masuk digital untuk melihat seluruh dokumentasi rekap festival kami.
                </p>
            </div>
        </div>

        <div class="w-full max-w-md mx-auto bg-[#0B0F26]/90 border border-white/10 rounded-2xl p-6 sm:p-8 shadow-xl relative overflow-hidden">
            
            <div class="flex border-b border-white/10 mb-6">
                <button id="tab-login" onclick="switchTab('login')" class="flex-1 pb-3 text-xs font-bold tracking-wider uppercase text-synes-teal border-b-2 border-synes-teal transition-all">Login</button>
                <button id="tab-signup" onclick="switchTab('signup')" class="flex-1 pb-3 text-xs font-bold tracking-wider uppercase text-white/40 hover:text-white transition-all">Sign Up</button>
            </div>

            <div id="auth-message" class="hidden mb-4 p-3 rounded-xl text-xs font-medium text-center"></div>

            <form id="auth-form" onsubmit="triggerAuth(event)" class="space-y-4">
                <div id="email-field">
                    <label class="block text-[10px] font-bold uppercase tracking-wider text-white/60 mb-1.5">Alamat Email</label>
                    <input type="email" id="auth-email" required class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-xs text-white focus:outline-none focus:border-synes-teal transition" placeholder="nama@email.com">
                </div>
                <div id="password-field">
                    <label class="block text-[10px] font-bold uppercase tracking-wider text-white/60 mb-1.5">Kata Sandi</label>
                    <input type="password" id="auth-password" required minlength="6" class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-xs text-white focus:outline-none focus:border-synes-teal transition" placeholder="••••••••">
                </div>

                <div class="pt-2 space-y-3">
                    <button type="submit" id="auth-submit-btn" class="w-full py-3.5 bg-gradient-to-r from-synes-accent to-pink-600 rounded-xl font-bold text-xs tracking-wider uppercase hover:shadow-[0_0_20px_rgba(255,59,105,0.35)] transform hover:-translate-y-0.5 transition duration-300">
                        Masuk Ke Beranda Utama
                    </button>

                    <div class="flex items-center justify-center my-2 space-x-2 opacity-40">
                        <div class="h-[1px] bg-white flex-1"></div>
                        <span class="text-[9px] font-bold tracking-widest uppercase">Atau</span>
                        <div class="h-[1px] bg-white flex-1"></div>
                    </div>

                    <button type="button" onclick="triggerAnonymous()" class="w-full py-3 bg-white/5 border border-white/10 hover:bg-white/10 rounded-xl font-semibold text-xs tracking-wider uppercase text-synes-teal transition duration-300 flex items-center justify-center space-x-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                        <span>Masuk Sebagai Guest (Anonim)</span>
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script>
        var currentMode = 'login';

        function switchTab(mode) {
            currentMode = mode;
            var tabLogin = document.getElementById('tab-login');
            var tabSignup = document.getElementById('tab-signup');
            var btnSubmit = document.getElementById('auth-submit-btn');
            var msgBox = document.getElementById('auth-message');
            
            if(msgBox) msgBox.classList.add('hidden');

            if(mode === 'login') {
                tabLogin.className = "flex-1 pb-3 text-xs font-bold tracking-wider uppercase text-synes-teal border-b-2 border-synes-teal transition-all";
                tabSignup.className = "flex-1 pb-3 text-xs font-bold tracking-wider uppercase text-white/40 hover:text-white transition-all";
                btnSubmit.innerText = "Masuk Ke Beranda Utama";
            } else {
                tabSignup.className = "flex-1 pb-3 text-xs font-bold tracking-wider uppercase text-synes-teal border-b-2 border-synes-teal transition-all";
                tabLogin.className = "flex-1 pb-3 text-xs font-bold tracking-wider uppercase text-white/40 hover:text-white transition-all";
                btnSubmit.innerText = "Daftar Akun Baru";
            }
        }

        // Jembatan pengaman untuk memanggil fungsi di dalam modul Firebase
        function triggerAuth(event) {
            event.preventDefault();
            if (typeof window.handleFirebaseAuth === 'function') {
                window.handleFirebaseAuth(currentMode);
            } else {
                showNativeMsg('Sistem Firebase sedang memuat atau config salah. Periksa F12 Console.', 'bg-yellow-500/10 text-yellow-400 border border-yellow-500/20');
            }
        }

        function triggerAnonymous() {
            if (typeof window.handleFirebaseAnonymous === 'function') {
                window.handleFirebaseAnonymous();
            } else {
                showNativeMsg('Sistem Firebase sedang memuat atau config salah. Periksa F12 Console.', 'bg-yellow-500/10 text-yellow-400 border border-yellow-500/20');
            }
        }

        function showNativeMsg(text, classes) {
            var msgBox = document.getElementById('auth-message');
            if(msgBox) {
                msgBox.className = "mb-4 p-3 rounded-xl text-xs font-medium text-center " + classes;
                msgBox.innerText = text;
                msgBox.classList.remove('hidden');
            }
        }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInAnonymously } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";

        // GANTI INI dengan objek config dari Firebase Console kamu agar koneksi aktif!
        const firebaseConfig = {
            apiKey: "AIzaSyAFKDsOpIX9v5jZWfxMycpUCsPylJx3FSM",
            authDomain: "synes-a7da3.firebaseapp.com",
            projectId: "synes-a7da3",
            storageBucket: "synes-a7da3.firebasestorage.app",
            messagingSenderId: "572685837271",
            appId: "1:572685837271:web:7870bef9a49c7833672192"
        };

        // Mengamankan inisialisasi agar jika config tiruan disisipkan, UI tidak ikutan mati total
        try {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);

            // Daftarkan fungsi ke objek global window SETELAH Firebase sukses di-init
            window.handleFirebaseAuth = function(mode) {
                const email = document.getElementById('auth-email').value;
                const password = document.getElementById('auth-password').value;

                if (mode === 'login') {
                    signInWithEmailAndPassword(auth, email, password)
                        .then(() => {
                            firebaseShowMsg('Login berhasil! Mengalihkan...', 'bg-green-500/10 text-green-400 border border-green-500/20');
                            setTimeout(() => { window.location.href = 'main.html'; }, 1000);
                        })
                        .catch((error) => {
                            firebaseShowMsg('Gagal Login: ' + mapError(error.code), 'bg-red-500/10 text-red-400 border border-red-500/20');
                        });
                } else {
                    createUserWithEmailAndPassword(auth, email, password)
                        .then(() => {
                            firebaseShowMsg('Registrasi berhasil! Mengalihkan...', 'bg-green-500/10 text-green-400 border border-green-500/20');
                            setTimeout(() => { window.location.href = 'main.html'; }, 1000);
                        })
                        .catch((error) => {
                            firebaseShowMsg('Gagal Daftar: ' + mapError(error.code), 'bg-red-500/10 text-red-400 border border-red-500/20');
                        });
                }
            };

            window.handleFirebaseAnonymous = function() {
                signInAnonymously(auth)
                    .then(() => {
                        firebaseShowMsg('Masuk sebagai Tamu berhasil! Mengalihkan...', 'bg-cyan-500/10 text-synes-teal border border-synes-teal/20');
                        setTimeout(() => { window.location.href = 'main.html'; }, 1000);
                    })
                    .catch((error) => {
                        firebaseShowMsg('Gagal Masuk Anonim: ' + mapError(error.code), 'bg-red-500/10 text-red-400 border border-red-500/20');
                    });
            };

        } catch (e) {
            console.error("Firebase Initialization Error: ", e);
        }

        function firebaseShowMsg(text, classes) {
            const msgBox = document.getElementById('auth-message');
            if(msgBox) {
                msgBox.className = "mb-4 p-3 rounded-xl text-xs font-medium text-center " + classes;
                msgBox.innerText = text;
                msgBox.classList.remove('hidden');
            }
        }

        function mapError(code) {
            switch(code) {
                case 'auth/user-not-found': return 'Email tidak terdaftar.';
                case 'auth/wrong-password': return 'Kata sandi salah.';
                case 'auth/email-already-in-use': return 'Email sudah digunakan akun lain.';
                case 'auth/invalid-email': return 'Format penulisan email salah.';
                case 'auth/weak-password': return 'Kata sandi terlalu pendek (min. 6 karakter).';
                case 'auth/operation-not-allowed': return 'Metode ini belum diaktifkan di Firebase Console.';
                default: return 'Terjadi kendala sistem/config Firebase salah.';
            }
        }
    </script>
</body>
</html>
